name: Build and push container image
run-name: ${{ gitea.actor }} is building and pushing container image
on: create

jobs:
  build-and-push-image:
    runs-on: builder-debian-12
    container:
      image: ghcr.io/catthehacker/ubuntu:act-latest
    env:
      REGISTRY_URL: ${{ vars.GIT_DOMAIN }}
      IMAGE: ${{ vars.GIT_REGISTRY_USER }}/${{ vars.IMAGE_NAME }}
    steps:
      - name: Log in to registry
        uses: https://github.com/docker/login-action@v3
        with:
          registry: ${{ vars.GIT_DOMAIN }}
          username: ${{ vars.GIT_REGISTRY_USER }}
          password: ${{ secrets.CONTAINER_REGISTRY_TOKEN }}
      - name: Checkout
        uses: https://github.com/actions/checkout@v4
      - name: Build image and push it to the registry
        run: |
          docker buildx create --name container --driver=docker-container
          docker buildx build --builder container --platform linux/amd64 -t ${REGISTRY_URL}/${IMAGE}:${{ gitea.ref_name }} -t ${REGISTRY_URL}/${IMAGE}:latest --push .
      - name: Restart deployment rollout in Kubernetes to apply new image version
        uses: https://github.com/actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: -n ${{ vars.KUBE_NAMESPACE }} rollout restart deployment ${{ vars.KUBE_DEPLOYMENT }}
